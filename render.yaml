# render.yaml configuration for Render deployment
services:
  - type: web
    name: inventory-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Djava.net.preferIPv4Stack=true -jar target/inventory-system-0.0.1-SNAPSHOT.jar
    envVars:
      JDBC_URL: ${JDBC_URL}
      JDBC_USER: ${JDBC_USER}
      JDBC_PASS: ${JDBC_PASS}
      JWT_SECRET: ${JWT_SECRET}
