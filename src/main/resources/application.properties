# === Active Profile ===
# Default to 'mysql' profile if SPRING_PROFILES_ACTIVE is not set
spring.datasource.url=${JDBC_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${JDBC_USER}
spring.datasource.password=${JDBC_PASS}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# === JWT Settings (common) ===
app.jwt.secret=${JWT_SECRET:your-super-secret-key-that-is-long-and-secure}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Server configuration
server.port=${PORT:8080}
server.servlet.context-path=/
